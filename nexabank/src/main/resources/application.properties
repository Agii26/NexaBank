# ─── Active profile ───────────────────────────────────────────────────────────
# Switch to "prod" on Railway: set env var SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=dev

# ─── App info ─────────────────────────────────────────────────────────────────
spring.application.name=nexabank

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# create-drop: wipes & recreates schema on every restart (safe for dev)
# TODO Phase 6: Change to "validate" before deploying to production
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JSON serialisation ───────────────────────────────────────────────────────
# Don't include null fields in API responses
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Springdoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
