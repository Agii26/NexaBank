# ─── Dev datasource — change creds to match your local MySQL ─────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/nexabank_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.nexabank=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── JWT ──────────────────────────────────────────────────────────────────────
# 256-bit base64-encoded secret — rotate this before production deploy
app.jwt.secret=t1IOFENUt9q4AK1qMBCaS0Q4WwvlpvAyE/SEh0nbopE=
# Access token: 15 minutes
app.jwt.expiration-ms=900000
# Refresh token: 7 days
app.jwt.refresh-expiration-ms=604800000
