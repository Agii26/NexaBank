# ─── Dev datasource — change creds to match your local MySQL ─────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/nexabank_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.nexabank=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
